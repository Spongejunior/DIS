{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body text-center p-5">
                <h1 class="display-5 mb-3">500</h1>
                <p class="lead">An unexpected error occurred while processing the request.</p>
                <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}" class="btn btn-primary">Return</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
